fullText:'\u65f6\u5149\u8375\u70c5\uff0c\u5c81\u6708\u5982\u68ad\uff0c\u5386\u53f2\u7684\u957f\u6cb3\u4e2d\uff0c\u65e0\u6570\u4e8b\u7269\u5982\u6d41\u661f\u822c\u5212\u8fc7\uff0c\u4f46\u603b\u6709\u4e00\u4e9b\u7ecf\u5178\u3001\u4e00\u4e9b\u601d\u60f3\u3001\u4e00\u4e9b\u7cbe\u795e\uff0c\u5982\u540c\u74bf\u74ff\u7684\u661f\u8fb0\uff0c\u5728\u65f6\u95f4\u7684\u6dec\u70bc\u4e0b\uff0c\u6108\u663e\u5176\u6d3b\u529b\u548c\u4ef7\u503c\uff0c\u8fd9\u4fbf\u662f\u201c\u5386\u4e45\u5f25\u65b0\u201d\u3002\n\n\u5386\u4e45\u5f25\u65b0\u7684\u7ecf\u5178\uff0c\u662f\u4e2d\u534e\u6587\u5316\u7684\u745e\u5b9d\u3002\u4ece\u300a\u8bd7\u7ecf\u300b\u7684\u201c\u5173\u5173\u96ce\u9e20\uff0c\u5728\u6cb3\u4e4b\u6d32\u201d\u5230\u300a\u7ea2\u697c\u68a6\u300b\u7684\u201c\u6ee1\u7eb8\u8352\u5510\u8a00\uff0c\u4e00\u628a\u8f9b\u9178\u6cea\u201d\uff0c\u8fd9\u4e9b\u53e4\u8001\u7684\u7ecf\u5178\u5728\u5386\u53f2\u7684\u6d2a\u6d41\u4e2d\u6d41\u4f20\u81f3\u4eca\uff0c\u4ecd\u7136\u6563\u53d1\u7740\u8ff7\u4eba\u7684\u9b45\u529b\u3002\u5b83\u4eec\u4e0d\u4ec5\u8bb0\u5f55\u4e86\u4e2d\u534e\u6c11\u65cf\u7684\u5386\u53f2\u548c\u6587\u5316\uff0c\u66f4\u8564\u542b\u7740\u6df1\u523b\u7684\u4eba\u751f\u54f2\u7406\u548c\u9053\u5fb7\u89c2\u5ff5\u3002\u6bcf\u4e00\u6b21\u9605\u8bfb\uff0c\u90fd\u80fd\u8ba9\u6211\u4eec\u611f\u53d7\u5230\u524d\u4eba\u7684\u667a\u6167\u548c\u60c5\u611f\uff0c\u8ba9\u6211\u4eec\u5728\u5feb\u8282\u594f\u7684\u751f\u6d3b\u4e2d\u627e\u5230\u5fc3\u7075\u7684\u5bc4\u6258\u3002\n\n\u5386\u4e45\u5f25\u65b0\u7684\u601d\u60f3\uff0c\u662f\u4eba\u7c7b\u667a\u6167\u7684\u7ed3\u6676\u3002\u4ece\u5b54\u5b50\u7684\u201c\u4ec1\u7231\u201d\u5230\u5b5f\u5b50\u7684\u201c\u6027\u5584\u8bba\u201d\uff0c\u4ece\u58a8\u5b50\u7684\u201c\u517c\u7231\u975e\u653b\u201d\u5230\u5e84\u5b50\u7684\u201c\u900d\u9065\u6e38\u201d\uff0c\u8fd9\u4e9b\u6770\u51fa\u7684\u601d\u60f3\u5728\u5386\u53f2\u7684\u957f\u6cb3\u4e2d\u95ea\u8000\u7740\u667a\u6167\u7684\u5149\u8292\u3002\u5b83\u4eec\u4e0d\u4ec5\u5f71\u54cd\u4e86\u4e2d\u56fd\u53e4\u4ee3\u7684\u653f\u6cbb\u3001\u6587\u5316\u548c\u793e\u4f1a\uff0c\u66f4\u6210\u4e3a\u5168\u4eba\u7c7b\u5171\u540c\u7684\u7cbe\u795e\u8d22\u5bcc\u3002\u6bcf\u4e00\u6b21\u601d\u8003\uff0c\u90fd\u80fd\u8ba9\u6211\u4eec\u9886\u7565\u5230\u5148\u8d24\u4eec\u7684\u6df1\u9042\u601d\u60f3\u548c\u5d07\u9ad8\u8ffd\u6c42\u3002\n\n\u5386\u4e45\u5f25\u65b0\u7684\u7cbe\u795e\uff0c\u662f\u4e2d\u534e\u6c11\u65cf\u7684\u7075\u9b42\u3002\u4ece\u53e4\u4ee3\u7684\u201c\u5927\u79b9\u6cbb\u6c34\u201d\u5230\u8fd1\u4ee3\u7684\u201c\u4e94\u56db\u8fd0\u52a8\u201d\uff0c\u4ece\u201c\u957f\u5f81\u7cbe\u795e\u201d\u5230\u201c\u6297\u6d2a\u7cbe\u795e\u201d\uff0c\u8fd9\u4e9b\u4f1f\u5927\u7684\u7cbe\u795e\u5728\u4e2d\u534e\u6c11\u65cf\u7684\u5386\u53f2\u4e2d\u4ee3\u4ee3\u76f8\u4f20\uff0c\u6fc0\u52b1\u7740\u4e00\u4ee3\u53c8\u4e00\u4ee3\u7684\u4e2d\u534e\u5150\u5973\u3002\u5b83\u4eec\u4e0d\u4ec5\u4f53\u73b0\u4e86\u4e2d\u534e\u6c11\u65cf\u4e0d\u5c48\u4e0d\u6320\u3001\u81ea\u5f3a\u4e0d\u606f\u7684\u6c11\u65cf\u7cbe\u795e\uff0c\u66f4\u6210\u4e3a\u6211\u4eec\u9762\u5bf9\u56f0\u96be\u548c\u6311\u6218\u65f6\u7684\u7cbe\u795e\u652f\u67f1\u3002\n\n\u5386\u4e45\u5f25\u65b0\u7684\u4e8b\u7269\uff0c\u662f\u65f6\u95f4\u7684\u988c\u8d60\uff0c\u662f\u5386\u53f2\u7684\u89c1\u8bc1\u3002\u56e0\u6b64\uff0c\u6211\u4eec\u5e94\u8be5\u73cd\u60dc\u8fd9\u4e9b\u5386\u4e45\u5f25\u65b0\u7684\u4e8b\u7269\uff0c\u4f20\u627f\u548c\u53d1\u626c\u5b83\u4eec\u7684\u4ef7\u503c\u548c\u7cbe\u795e\uff0c\u8ba9\u5b83\u4eec\u5728\u65b0\u7684\u65f6\u4ee3\u4e2d\u7ee7\u7eed\u7126\u53d1\u51fa\u65b0\u7684\u5149\u5f69\u3002\u540c\u65f6\uff0c\u6211\u4eec\u4e5f\u5e94\u8be5\u52aa\u529b\u521b\u9020\u5c5e\u4e8e\u81ea\u5df1\u7684\u5386\u4e45\u5f25\u65b0\u7684\u4e8b\u7269\uff0c\u4e3a\u540e\u4eba\u7559\u4e0b\u5b9d\u8d35\u7684\u8d22\u5bcc\u548c\u56de\u5fc6\u3002'}
]},
{year:2023,title:"\u7eed\u822a",
prompt:L+"\u7eed\u822a"+R+"\u4e00\u8bcd\uff0c\u539f\u6307\u8fde\u7eed\u822a\u884c\uff0c\u4eca\u5929\u88ab\u8d4b\u4e88\u4e86\u65b0\u7684\u542b\u4e49\uff0c\u5982\u4e3a\u9752\u6625\u7eed\u822a\u3001\u79d1\u6280\u4e3a\u7ecf\u6d4e\u53d1\u5c55\u7eed\u822a\u7b49\u3002\n\n\u8bf7\u4ee5"+L+"\u7eed\u822a"+R+"\u4e3a\u9898\u76ee\uff0c\u5199\u4e00\u7bc7\u8bae\u8bba\u6587\u3002",
samples:[
{thesis:"\u7eed\u822a\u987b\u4ee5\u5fd7\u5b8f\u610f\u575a\u4e3a\u5185\u529b\uff0c\u4ee5\u5584\u5047\u4e8e\u7269\u4e3a\u5916\u529b\uff0c\u5185\u5916\u517c\u4fee\u65b9\u80fd\u6301\u7eed\u8fdc\u822a\u3002",
args:["\u5b54\u5b50\u5468\u6e38\u5217\u56fd\u88ab\u56f0\u9648\u8521\u4ecd\u5f26\u6b4c\u4e0d\u8f8d\u2014\u2014\u5fd7\u575a\u5185\u529b\u5178\u8303","\u5218\u90a6\u5584\u501f\u4ed6\u4eba\u4e4b\u529b\u6210\u5c31\u6c49\u4e1a\uff1b\u9b4f\u6e90\u8bd7\u5937\u957f\u6280\u4ee5\u5236\u5937\u2014\u2014\u5584\u7528\u5916\u529b","\u5f53\u4ee3\u4e2d\u56fd\u4ee5\u6587\u5316\u81ea\u4fe1+\u517c\u5bb9\u5e76\u84c4\u5b9e\u73b0\u56fd\u5bb6\u7eed\u822a"],
structure:"\u5185\u529b\uff08\u5fd7\u5b8f\u610f\u575a\uff09\u2192\u5916\u529b\uff08\u5584\u5047\u4e8e\u7269\uff09\u2192\u4e2a\u4eba\u5230\u56fd\u5bb6\u9012\u8fdb\u2192\u603b\u7ed3",
highlight:"\u8fa9\u8bc1\u5206\u6790\u5185\u5916\u4e24\u529b\uff0c\u7531\u4e2a\u4eba\u5ef6\u4f38\u81f3\u56fd\u5bb6\uff0c\u903b\u8f91\u4e25\u5bc6\u5c42\u6b21\u6e05\u6670",
fullText:'\u4eba\u751f\u554a\uff0c\u6765\u4e0d\u5f97\u534a\u70b9\u5e73\u9759\u3002\u82e5\u8239\u9a76\u4e8e\u6d77\uff0c\u82e5\u9e1f\u98de\u4e8e\u5929\uff0c\u4e00\u65e6\u9759\u6b62\uff0c\u4fbf\u70df\u9500\u4e91\u706d\uff0c\u5f62\u795e\u4ff1\u6563\u3002\u524d\u884c\u554a\uff0c\u4efb\u72c2\u98ce\u66b4\u96e8\u3001\u60ca\u96f7\u70c8\u7535\uff0c\u9014\u4e2d\u81ea\u6709\u98ce\u666f\uff0c\u524d\u65b9\u5fc5\u6709\u6625\u5149\u65e0\u9650\u3002\u822a\u884c\u672c\u9700\u529b\u91cf\uff0c\u4f46\u6211\u4e5f\u8981\u6fc0\u60c5\u4e3a\u4f34\u3002\n\n\u56e0\u4e3a\u6211\u4eec\u751f\u800c\u4e3a\u4eba\uff0c\u7acb\u4e8e\u5929\u5730\u4e4b\u95f4\uff0c\u6240\u4ee5\u9700\u884c\u8fdc\u65b9\uff0c\u5fd7\u5b58\u9ad8\u8fdc\uff1b\u53c8\u56e0\u4e00\u8def\u5fc5\u6709\u5d4e\u5d70\uff0c\u91cd\u91cd\u8270\u96be\uff0c\u6545\u9700\u7eed\u822a\uff0c\u6c38\u8fdc\u5411\u524d\u3002\n\n\u4f55\u4ee5\u7eed\u822a\uff1f\u5fd7\u5b8f\u610f\u575a\u3002\u5b50\u66f0\u201c\u58eb\u4e0d\u53ef\u4ee5\u4e0d\u5f18\u6bc5\uff0c\u4efb\u91cd\u800c\u9053\u8fdc\u3002\u201d\u5b54\u5b50\u5468\u6e38\u5217\u56fd\uff0c\u4ee5\u4f20\u5723\u8d24\u4e4b\u5fb7\uff0c\u88ab\u56f0\u9648\u8521\uff0c\u5f26\u6b4c\u4e0d\u8f8d\uff0c\u6b64\u4e3a\u4eba\u751f\u7eed\u822a\u3002\u7eed\u822a\u4e4b\u80fd\u91cf\u6e90\u4e8e\u5176\u8fdc\u5927\u4e4b\u7406\u60f3\u53ca\u521a\u6bc5\u4e4b\u54c1\u8d28\u3002\u4eba\u82e5\u65e0\u5fd7\uff0c\u6216\u662f\u5fd7\u5728\u540d\u5229\uff0c\u90a3\u4e48\u4fbf\u4f1a\u9047\u963b\u800c\u6b62\u3001\u9022\u5c90\u5219\u8ff7\u3002\u6b27\u9633\u4fee\u591c\u89c2\u661f\u6708\uff0c\u89c1\u9668\u77f3\u800c\u601d\u541b\u5b50\u5e94\u6709\u7cbe\u6c14\uff0c\u65b9\u80fd\u748b\u74ff\u5386\u53f2\u957f\u6cb3\uff1b\u89c2\u65e5\u6708\u4e94\u661f\uff0c\u5219\u77e5\u541b\u5b50\u9700\u81ea\u5f3a\u4e0d\u606f\uff0c\u53c8\u5e94\u6cbb\u4e16\u5229\u6c11\uff0c\u65b9\u4e0d\u8d1f\u541b\u5b50\u4e4b\u540d\u3002\u56e0\u6b64\u8bf4\uff0c\u7eed\u822a\u4e4b\u529b\u5f53\u5148\u81ea\u4e8e\u5185\u3002\u65e0\u8bba\u53e4\u4eca\uff0c\u51e1\u5f04\u6f6e\u4e8e\u5386\u53f2\u957f\u6cb3\u8005\uff0c\u7686\u662f\u5982\u6b64\uff0c\u65e0\u4e0d\u201c\u5f18\u6bc5\u201d\u3002\n\n\u4ec5\u5982\u6b64\uff0c\u53ef\u5426\uff1f\u6108\u4ee5\u4e3a\uff0c\u9664\u6fc0\u60c5\u4f5c\u4e3a\u7eed\u822a\u4e4b\u52a8\u529b\u5916\uff0c\u4ea6\u4e0d\u53ef\u5c11\u5916\u90e8\u4e4b\u52a9\u529b\u3002\u8340\u5b50\u66f0\u201c\u541b\u5b50\u5584\u5047\u4e8e\u7269\u4e5f\u201d\u3002\u77e5\u9053\u98ce\u5411\uff0c\u501f\u52a9\u98ce\u529b\uff0c\u98ce\u81ea\u504f\u7231\u4e4b\u3002\u201c\u597d\u98ce\u51ed\u501f\u529b\uff0c\u9001\u6211\u4e0a\u9752\u4e91\u201d\uff0c\u201c\u597d\u98ce\u201d\u5904\u5904\u7686\u5728\uff0c\u7136\u9700\u8c26\u900a\u4e4b\u6001\u5ea6\u3001\u5305\u5bb9\u4e4b\u80f8\u6000\u4e0e\u501f\u529b\u4e4b\u667a\u6167\uff0c\u517c\u5bb9\u5e76\u84c4\uff0c\u5316\u4e3a\u5df1\u7528\u3002\u6c49\u9ad8\u7956\u5218\u90a6\u5584\u501f\u4ed6\u4eba\u4e4b\u529b\uff0c\u867d\u51fa\u8eab\u4f4e\u8d31\u3001\u4e0d\u5584\u6587\u6b66\uff0c\u5374\u80fd\u5f00\u521b\u5927\u6c49\u4e4b\u57fa\u4e1a\uff1b\u9b4f\u6e90\u9ad8\u5021\u201c\u5e08\u5937\u957f\u6280\u4ee5\u5236\u5937\u201d\uff0c\u624d\u6709\u4e86\u6d0b\u52a1\u8fd0\u52a8\u3001\u7ef4\u65b0\u53d8\u6cd5\u3001\u8f9b\u4ea5\u9769\u547d\u7b49\u9769\u65b0\uff0c\u8ba9\u702e\u5371\u4e4b\u4e2d\u534e\u5f97\u4ee5\u5ef6\u7eed\uff1b\u4e2d\u56fd\u5171\u4ea7\u515a\u501f\u52a9\u897f\u65b9\u5171\u4ea7\u4e3b\u4e49\u4e4b\u601d\u60f3\uff0c\u5316\u800c\u7528\u4e4b\uff0c\u624d\u8ba9\u79ef\u8d2b\u79ef\u5f31\u4e4b\u6c11\u65cf\u6709\u4e86\u6c11\u65cf\u590d\u5174\u4e4b\u5e0c\u671b\u3002\u7531\u6b64\u53ef\u89c1\uff0c\u5982\u6c42\u53d1\u5c55\uff0c\u5207\u4e0d\u53ef\u72c2\u598d\u81ea\u5927\uff0c\u66f4\u4e0d\u80fd\u95ed\u95e8\u9020\u8f66\u3002\n\n\u5185\u529b\u5f15\u4e4b\uff0c\u5916\u529b\u52a9\u4e4b\uff0c\u65b9\u80fd\u6301\u7eed\uff0c\u65b9\u80fd\u8fdc\u822a\u3002\n\n\u4e2a\u4eba\u53d1\u5c55\u5982\u662f\uff0c\u56fd\u5bb6\u6c11\u65cf\u4ea6\u5982\u662f\u3002\u5f53\u4eca\u4e2d\u56fd\u5145\u6ee1\u5e0c\u671b\uff0c\u5feb\u901f\u524d\u884c\uff0c\u65e2\u6709\u4f18\u79c0\u6587\u5316\u4e4b\u5185\u529b\uff0c\u53c8\u5584\u501f\u4ed6\u529b\u4ee5\u52a0\u901f\u3002\u6211\u4eec\u4ee5\u5b9e\u73b0\u201c\u4e2d\u56fd\u68a6\u201d\u4e3a\u7406\u60f3\uff0c\u4ee5\u8e8f\u5b9e\u575a\u97e7\u4e3a\u6b65\u4f10\uff0c\u6587\u5316\u8ba4\u540c\u548c\u6587\u5316\u81ea\u4fe1\u7ed9\u6211\u4eec\u65e0\u7a77\u7684\u529b\u91cf\uff1b\u6211\u4eec\u61c2\u5f97\u5305\u5bb9\u3001\u5438\u7eb3\uff0c\u61c2\u5f97\u6587\u5316\u4e92\u9274\uff0c\u8fd9\u8ba9\u6211\u4eec\u62e5\u6709\u4e86\u53ef\u501f\u4e4b\u201c\u98ce\u201d\u3002\u4e8c\u8005\u52a0\u6301\uff0c\u76db\u4e16\u80e1\u8fdc\uff1f\n\n\u4e2a\u4eba\u4e3a\u6c11\u65cf\u4e4b\u4e2a\u4eba\uff0c\u6c11\u65cf\u4e3a\u4e2a\u4eba\u4e4b\u6c11\u65cf\uff0c\u4e2a\u4eba\u4e4b\u8363\u5149\u53ea\u80fd\u5728\u65f6\u4ee3\u548c\u6c11\u65cf\u7684\u70d8\u6258\u4e0b\u7ee7\u653e\u3002\u4e2a\u4eba\u6291\u6216\u6c11\u65cf\uff0c\u524d\u884c\u4e4b\u8def\u65e0\u7ec8\u70b9\uff0c\u5185\u5916\u7eed\u4e4b\uff0c\u4ee5\u56fe\u8fdc\u822a\u3002'}
]},
{year:2022,title:"\u5b66\u4e60\u4eca\u8bf4",
prompt:"\u53e4\u4eba\u8bf4\uff0c"+L+"\u5b66\u4e0d\u53ef\u4ee5\u5df2"+R+"\uff0c\u91cd\u89c6\u5b66\u4e60\u662f\u4e2d\u534e\u6c11\u65cf\u7684\u4f18\u826f\u4f20\u7edf\u3002\u5728\u5f53\u4ee3\u4e2d\u56fd\uff0c\u4eba\u4eec\u5bf9\u5b66\u4e60\u7684\u7406\u89e3\u4e0e\u53e4\u4eba\u6709\u76f8\u540c\u4e4b\u5904\uff0c\u4e5f\u6709\u4e0d\u4e00\u6837\u7684\u5730\u65b9\u3002\n\n\u8bf7\u4ee5"+L+"\u5b66\u4e60\u4eca\u8bf4"+R+"\u4e3a\u9898\u76ee\uff0c\u5199\u4e00\u7bc7\u8bae\u8bba\u6587\u3002",
samples:[
{thesis:"\u5b66\u4e60\u80fd\u5426\u6301\u4e45\uff0c\u5173\u952e\u5728\u4e8e\u76ee\u7684\u2014\u2014\u5b54\u5b50\u56e0\u201c\u6c42\u9053\u201d\u800c\u201c\u5b66\u800c\u4e0d\u538c\u201d\uff0c\u4eca\u4eba\u82e5\u53ea\u201c\u6c42\u5206\u201d\u5219\u7ec8\u5c06\u538c\u5b66\u3002",
args:["\u5b54\u5b50\u201c\u53d1\u6124\u5fd8\u98df\uff0c\u4e50\u4ee5\u5fd8\u5fe7\u201d\u2014\u2014\u4e3a\u6c42\u9053\u800c\u5b66\u7684\u6b63\u9762\u5178\u8303","\u989c\u6e0a\u3001\u5b50\u8d21\u8ffd\u95ee\u201c\u5982\u4e4b\u4f55\u201d\u800c\u975e\u6c42\u6807\u51c6\u7b54\u6848","\u4eca\u65e5\u201c\u6495\u4e66\u8282\u201d\u3001\u9898\u6d77\u6218\u672f\u2014\u2014\u529f\u5229\u5316\u5b66\u4e60\u7684\u5f53\u4ee3\u53cd\u9762"],
structure:"\u5b54\u5b50\u5178\u8303\u2192\u4eca\u65e5\u5b66\u751f\u5bf9\u6bd4\u2192\u539f\u56e0\u5256\u6790\uff08\u76ee\u7684\u4e0d\u540c\uff09\u2192\u65b9\u6cd5\u6279\u5224\u2192\u603b\u7ed3",
highlight:"\u53e4\u4eca\u5bf9\u6bd4\u7280\u5229\uff0c\u5f15\u7528\u300a\u8bba\u8bed\u300b\u7cbe\u51c6\u5177\u4f53\uff0c\u6279\u5224\u610f\u8bc6\u4e0e\u5efa\u8bbe\u6027\u517c\u5177",
fullText:'\u201c\u5b66\u4e0d\u53ef\u4ee5\u5df2\u201d\u662f\u300a\u8340\u5b50\u00b7\u52a1\u5b66\u300b\u4e2d\u7684\u4e00\u53e5\u8bdd\uff0c\u5c31\u662f\u4eca\u5929\u4fd7\u8bdd\u6240\u8bf4\u7684\u201c\u6d3b\u5230\u8001\uff0c\u5b66\u5230\u8001\u201d\u3002\n\n\u4e07\u4e16\u5e08\u8868\u7684\u5b54\u592b\u5b50\u53ef\u4ee5\u7b97\u5f97\u4e0a\u4e00\u4e2a\u201c\u6d3b\u5230\u8001\uff0c\u5b66\u5230\u8001\u201d\u5178\u578b\u4ee3\u8868\u3002\u4ed6\u81ea\u8ff0\u201c\u5176\u4e3a\u4eba\u4e5f\uff0c\u53d1\u6124\u5fd8\u98df\uff0c\u4e50\u4ee5\u5fd8\u5fe7\uff0c\u4e0d\u77e5\u8001\u4e4b\u5c06\u81f3\u201d\u3002\u8fd9\u53ef\u4e0d\u662f\u592b\u5b50\u5439\u725b\uff0c\u5728\u300a\u8bba\u8bed\u300b\u4e2d\uff0c\u6709\u5f88\u591a\u5185\u5bb9\u5370\u8bc1\u4e86\u4ed6\u4e0d\u53ea\u662f\u8fd9\u6837\u8bf4\u7684\uff0c\u800c\u4e14\u4e5f\u662f\u8fd9\u6837\u505a\u7684\uff0c\u4ed6\u4e00\u8f88\u5b50\u90fd\u5728\u201c\u4e3a\u4e4b\u4e0d\u538c\uff0c\u8bef\u4eba\u4e0d\u5026\u201d\u4e2d\u5ea6\u8fc7\u3002\n\n\u53cd\u89c2\u4eca\u65e5\uff0c\u867d\u7136\u63d0\u5012\u5efa\u8bbe\u5b66\u4e60\u578b\u793e\u4f1a\uff0c\u57f9\u517b\u7ec8\u8eab\u5b66\u4e60\u7684\u610f\u8bc6\uff0c\u4f46\u770b\u770b\u6211\u4eec\u7684\u5b66\u751f\uff0c\u5728\u4e2d\u8003\u6216\u8005\u9ad8\u8003\u524d\u540e\u7684\u8868\u73b0\u5427\uff0c\u4ed6\u4eec\u628a\u5404\u79cd\u8bfe\u672c\u3001\u7ec3\u4e60\u518c\u6495\u5f97\u7c89\u788e\uff0c\u7136\u540e\u4ece\u6559\u5b66\u697c\u4e0a\u96ea\u7247\u822c\u5730\u629b\u6d12\u4e0b\u6765\uff0c\u751a\u81f3\u6709\u4e9b\u5b66\u6821\u7f8e\u5176\u540d\u66f0\u201c\u6495\u4e66\u8282\u201d\uff0c\u53f7\u79f0\u662f\u4e3a\u4e86\u5b66\u751f\u51cf\u538b\u3002\u8fd9\u4e9b\u5b66\u751f\u662f\u6709\u591a\u538c\u6068\u5b66\u4e60\u624d\u8fd9\u4e48\u505a\u554a\u3002\n\n\u4e3a\u4ec0\u4e48\u4f1a\u51fa\u73b0\u8fd9\u6837\u9c9c\u660e\u7684\u5bf9\u6bd4\u5462\uff1f\u5b54\u5b50\u8bf4\u201c\u5b66\u800c\u4e0d\u538c\u201d\uff0c\u600e\u4e48\u4eca\u5929\u7684\u9752\u5e74\u5b66\u5b50\u53d8\u6210\u201c\u5b66\u800c\u538c\u201d\u5462\uff1f\u56e0\u4e3a\u4e8c\u8005\u7684\u5b66\u4e60\u76ee\u7684\u4e0d\u540c\u3002\u5b54\u5b50\u5b66\u800c\u4e0d\u538c\uff0c\u662f\u56e0\u4e3a\u6000\u7740\u4e00\u9897\u6c42\u9053\u4e4b\u5fc3\uff0c\u6240\u4ee5\u624d\u6709\u201c\u671d\u95ee\u9053\uff0c\u5915\u6b7b\u53ef\u77e3\u201d\u3002\u800c\u4eca\u5929\u7684\u5b66\u751f\u5b66\u4e60\u53ea\u662f\u4e3a\u4e86\u90a3\u4e2a\u5206\u6570\uff0c\u53ea\u662f\u4e3a\u4e86\u90a3\u5757\u654f\u95e8\u7816\uff0c\u628a\u8003\u4e0a\u597d\u9ad8\u4e2d\u3001\u8003\u4e0a\u597d\u5927\u5b66\u8bef\u89e3\u4e3a\u662f\u5b9e\u73b0\u7406\u60f3\u3001\u8fbe\u6210\u5fd7\u5411\uff0c\u4e8e\u662f\u96be\u514d\u5728\u67d0\u4e00\u4e2a\u9636\u6bb5\u7684\u76ee\u6807\u5b9e\u73b0\u4e4b\u540e\u5c31\u5f7b\u5e95\u8eba\u5e73\u4e86\u3002\n\n\u5b54\u5b50\u8bf4\uff1a\u201c\u4e0d\u66f0\u5982\u4e4b\u4f55\uff0c\u5982\u4e4b\u4f55\u8005\uff0c\u543e\u672b\u5982\u4e4b\u4f55\u4e5f\u5df2\u77e3\u3002\u201d\u4f5c\u4e3a\u8001\u5e08\uff0c\u4ed6\u5e0c\u671b\u5b66\u751f\u80fd\u591a\u95ee\u201c\u5982\u4e4b\u4f55\u201d\uff0c\u4e5f\u5c31\u662f\u8981\u591a\u52a8\u8111\u60f3\u4e00\u60f3\u600e\u4e48\u529e\uff0c\u800c\u4e0d\u662f\u628a\u6807\u51c6\u7b54\u6848\u76f4\u63a5\u544a\u8bc9\u7ed9\u4ed6\u4eec\u3002\u4ec5\u4ec5\u4e00\u4e2a\u4ec0\u4e48\u662f\u201c\u5b5d\u201d\u7684\u95ee\u9898\uff0c\u4ed6\u5c31\u9488\u5bf9\u4e0d\u540c\u5b66\u751f\u7ed9\u51fa\u4e86\u4e0d\u540c\u7684\u7b54\u6848\u3002\n\n\u5b54\u5b50\u7684\u5b66\u751f\u4e5f\u5b9e\u8df5\u8001\u5e08\u7684\u6559\u8beb\uff1a\u989c\u6e0a\u95ee\u4ec1\u65f6\uff0c\u80fd\u591f\u201c\u8bf7\u95ee\u5176\u76ee\u201d\uff1b\u5b50\u8d21\u95ee\u653f\u65f6\uff0c\u80fd\u8ffd\u95ee\u201c\u5fc5\u4e0d\u5f97\u5df2\u800c\u53bb\u4e4b\uff0c\u4e8e\u65af\u4e09\u8005\u4f55\u5148\u201d\u3002\u6b63\u56e0\u4e3a\u5982\u6b64\uff0c\u624d\u6709\u4e86\u540d\u5782\u9752\u53f2\u7684\u4e03\u5341\u4e8c\u8d24\u4eba\u3002\n\n\u53cd\u89c2\u4eca\u65e5\uff0c\u867d\u7136\u6709\u4e9b\u5b66\u6821\u3001\u6709\u4e9b\u8001\u5e08\u4e5f\u5728\u53e3\u5934\u4e0a\u8bf4\u8981\u57f9\u517b\u5b66\u751f\u7684\u601d\u7ef4\u80fd\u529b\uff0c\u53ef\u5b9e\u9645\u4e0a\u53c8\u662f\u600e\u4e48\u505a\u7684\u5462\uff1f\u4e00\u5957\u53c8\u4e00\u5957\u8bd5\u5377\u65e0\u6b62\u606f\u5730\u7529\u7ed9\u5b66\u751f\uff0c\u505a\u5b8c\u4e86\u671f\u672b\u505a\u4e00\u6a21\uff0c\u505a\u5b8c\u4e86\u4e00\u6a21\u505a\u4e8c\u6a21\uff0c\u7136\u540e\u5c31\u5f00\u59cb\u5bf9\u7b54\u6848\uff0c\u8981\u5b66\u751f\u8bb0\u4f4f\u6240\u8c13\u6807\u51c6\u7b54\u6848\uff0c\u800c\u4ece\u4e0d\u5021\u5bfc\u4ed6\u4eec\u591a\u8ffd\u95ee\u4e00\u4e0b\u4e3a\u4ec0\u4e48\u3002\u4f9d\u9760\u7586\u72c2\u5730\u538b\u69a8\u5b66\u751f\u5b66\u4e60\u65f6\u95f4\uff0c\u589e\u8bc4\u900f\u652f\u5b66\u4e60\u5174\u8da3\u6765\u6c42\u9ad8\u5206\u3002\n\n\u5b66\u751f\u81ea\u5df1\u5462\uff1f\u4ed6\u4eec\u4e5f\u5df2\u7ecf\u4e0d\u4e60\u60ef\u4e8e\u8ffd\u95ee\u67d0\u4e9b\u4e8b\u60c5\u8be5\u4e0d\u8be5\u505a\u3001\u503c\u4e0d\u503c\u5f97\u505a\uff0c\u53cd\u6b63\u53ea\u662f\u4e00\u95e8\u5fc3\u601d\u57cb\u5934\u505a\u9898\uff0c\u4e00\u4e2a\u53c8\u4e00\u4e2a\u6807\u51c6\u7b54\u6848\u8bb0\u4f4f\u800c\u5df2\u3002\u4e5f\u6b63\u56e0\u4e3a\u5982\u6b64\uff0c\u624d\u6709\u4e86\u4ece\u601d\u60f3\u5230\u5065\u5eb7\uff0c\u4ece\u7cbe\u795e\u5230\u70ed\u60c5\u5b8c\u5168\u88ab\u6398\u7a7a\u7684\u201c\u7a7a\u5fc3\u4eba\u201d\u3002\n\n\u6211\u4e0d\u662f\u539a\u53e4\u8584\u4eca\uff0c\u6ce5\u53e4\u4e0d\u5316\u4e4b\u4eba\u3002\u4f46\u5728\u8c08\u201c\u5b66\u4e60\u4eca\u8bf4\u201d\u65f6\uff0c\u6211\u4ee5\u4e3a\u6781\u6709\u5fc5\u8981\u641e\u6e05\u695a\u54ea\u4e9b\u5c5e\u4e8e\u5b66\u4e60\u65b9\u9762\u7684\u57fa\u672c\u5e38\u8bc6\u3002\u5982\u679c\u5fd8\u4e86\u5f88\u591a\u5f88\u201c\u53e4\u201d\u7684\u57fa\u672c\u5e38\u8bc6\uff0c\u4e3a\u4e86\u201c\u4eca\u201d\u800c\u201c\u4eca\u201d\uff0c\u4e3a\u4e86\u201c\u65b0\u201d\u800c\u201c\u65b0\u201d\uff0c\u6700\u7ec8\u53ea\u80fd\u662f\u201c\u6b62\u589e\u7b11\u8033\u201d\u3002'},
{thesis:"\u53e4\u4eca\u5b66\u4e60\u89c2\u540c\u4e2d\u6709\u5f02\u2014\u2014\u76ee\u7684\u76f8\u901a\uff0c\u800c\u5185\u5bb9\u3001\u65b9\u6cd5\u4e0e\u6001\u5ea6\u968f\u65f6\u4ee3\u800c\u53d8\uff1b\u4eca\u65e5\u4e4b\u8fdb\u6b65\u5728\u4e8e\u6253\u7834\u201c\u7693\u9996\u7a77\u7ecf\u201d\uff0c\u786e\u7acb\u601d\u60f3\u81ea\u7531\u3002",
args:["\u5b66\u4e60\u76ee\u7684\uff1a\u53e4\u4eba\u4fee\u8eab\u9f50\u5bb6 vs \u4eca\u4eba\u7d20\u8d28\u8d21\u732e\u2014\u2014\u5f02\u66f2\u540c\u5de5","\u5b66\u4e60\u65b9\u6cd5\uff1a\u53e4\u4eba\u201c\u516d\u7ecf\u6ce8\u6211\u201d\u7693\u9996\u7a77\u7ecf vs \u4eca\u4eba\u201c\u6211\u6ce8\u516d\u7ecf\u201d\u72ec\u7acb\u601d\u8003","\u5b66\u4e60\u5185\u5bb9\uff1a\u56db\u4e66\u4e94\u7ecf vs \u8de8\u5b66\u79d1\u77e5\u8bc6\u5927\u6269\u5c55"],
structure:"\u76ee\u7684\uff08\u540c\uff09\u2192\u5185\u5bb9\uff08\u5927\u53d8\uff09\u2192\u65b9\u6cd5\uff08\u8d28\u53d8\uff09\u2192\u53e4\u4eca\u4e92\u9274\u6536\u5c3e",
highlight:"\u4e09\u7ef4\u7cfb\u7edf\u6bd4\u8f83\uff0c\u5207\u4e2d\u9898\u76ee\u201c\u4eca\u8bf4\u201d\u91cd\u70b9\uff0c\u6709\u6e29\u6545\u77e5\u65b0\u7684\u6279\u5224\u773c\u5149",
fullText:'\u5b66\u4e60\u662f\u4eba\u7c7b\u7684\u91cd\u8981\u7279\u5f81\u4e4b\u4e00\uff0c\u4e5f\u6b63\u662f\u56e0\u4e3a\u62e5\u6709\u5b66\u4e60\u80fd\u529b\uff0c\u4eba\u7c7b\u793e\u4f1a\u624d\u5f97\u4ee5\u4e0d\u65ad\u8fdb\u6b65\uff0c\u53d1\u5c55\u5230\u4eca\u5929\u3002\n\n\u5bf9\u4e8e\u5b66\u4e60\uff0c\u53e4\u4eca\u90fd\u63d0\u51fa\u4e86\u4e0d\u5c11\u770b\u6cd5\uff0c\u6709\u4e9b\u662f\u76f8\u540c\u7684\uff0c\u6709\u4e9b\u5219\u4e0d\u4e00\u6837\u3002\n\n\u5c31\u5b66\u4e60\u7684\u76ee\u7684\u800c\u8a00\uff0c\u53e4\u4eba\u8ba4\u4e3a\u662f\u201c\u8bda\u610f\u3001\u6b63\u5fc3\u3001\u4fee\u8eab\u3001\u9f50\u5bb6\u3001\u6cbb\u56fd\u3001\u5e73\u5929\u4e0b\u201d\uff0c\u6216\u8005\u8bf4\u662f\u201c\u5b66\u6210\u6587\u6b66\u827a\uff0c\u8d27\u4e0e\u5e1d\u738b\u5bb6\u201d\u3002\u6211\u4eec\u4eca\u5929\u7684\u4eba\u8ba4\u4e3a\u662f\u63d0\u5347\u81ea\u5df1\u7684\u7d20\u8d28\u4fee\u517b\uff0c\u4e3a\u793e\u4f1a\u3001\u4e3a\u56fd\u5bb6\u505a\u51fa\u8d21\u732e\u3002\u8fd9\u65b9\u9762\u5dee\u5f97\u4e0d\u591a\uff0c\u65e0\u8bba\u53e4\u4eca\uff0c\u5b66\u4e60\u7684\u76ee\u6807\u90fd\u662f\u65e2\u4e3a\u5df1\uff0c\u53c8\u4e3a\u56fd\u3002\n\n\u5c31\u5b66\u4e60\u7684\u5185\u5bb9\u800c\u8a00\uff0c\u53e4\u4eba\u4e3b\u8981\u662f\u5b66\u201c\u56db\u4e66\u4e94\u7ecf\u201d\uff0c\u6216\u201c\u793c\u4e50\u5c04\u5fa1\u4e66\u6570\u201d\uff0c\u6216\u7434\u68cb\u4e66\u753b\u3002\u4eca\u5929\u7684\u4eba\u4e0d\u4ec5\u8981\u5b66\u53e4\u4ee3\u7684\u6587\u53f2\u54f2\u7ecf\u5178\uff0c\u800c\u4e14\u8981\u5b66\u8fd1\u4ee3\u4ee5\u6765\u7684\u6570\u7406\u5316\u7b49\u79d1\u5b66\uff0c\u4ee5\u53ca\u6e38\u6cf3\u3001\u6253\u7403\u7b49\u5065\u8eab\u8fd0\u52a8\u3002\u8fd9\u65b9\u9762\uff0c\u4eca\u4eba\u5b66\u7684\u4e1c\u897f\u6bd4\u53e4\u4eba\u591a\u5f97\u591a\u3002\n\n\u5c31\u5b66\u4e60\u7684\u65b9\u6cd5\u800c\u8a00\uff0c\u53e4\u4eba\u7684\u89c2\u70b9\u4e4b\u4e00\u662f\u201c\u5b66\u4e0d\u53ef\u4ee5\u5df2\u201d\u3002\u4eca\u5929\u7684\u4eba\u4e5f\u8ba4\u4e3a\u5b66\u4e60\u8981\u6301\u4e4b\u4ee5\u6052\u3002\u8fd9\u4e00\u70b9\u4e0a\uff0c\u5012\u662f\u53e4\u4eca\u76f8\u540c\u3002\n\n\u53e4\u4eba\u7684\u89c2\u70b9\u4e4b\u4e8c\u662f\u201c\u7693\u9996\u7a77\u7ecf\u201d\u201c\u516d\u7ecf\u6ce8\u6211\u201d\uff0c\u628a\u201c\u56db\u4e66\u4e94\u7ecf\u201d\u89c6\u4f5c\u572d\u7944\uff0c\u60df\u6709\u63a5\u53d7\uff0c\u4e0d\u53ef\u8d28\u7591\u3002\u4eca\u5929\u7684\u4eba\u5219\u8ba4\u4e3a\u201c\u601d\u60f3\u81ea\u7531\u201d\u201c\u6211\u6ce8\u516d\u7ecf\u201d\uff0c\u5723\u8d4e\u4e4b\u8bf4\u4e5f\u5e76\u975e\u4e0d\u53ef\u6311\u6218\uff0c\u6ca1\u6709\u4eba\u80fd\u201c\u4e00\u53e5\u9876\u4e00\u4e07\u53e5\u201d\uff0c\u4e00\u5207\u90fd\u987b\u7b26\u5408\u5e38\u8bc6\u3001\u903b\u8f91\uff0c\u7ecf\u5f97\u8d77\u5b9e\u8df5\u7684\u68c0\u9a8c\u3002\u8fd9\u65b9\u9762\uff0c\u53e4\u4eca\u76f8\u8ddd\u751a\u8fdc\u3002\u5f53\u7136\uff0c\u8fd9\u662f\u4eca\u4eba\u6bd4\u53e4\u4eba\u8fdb\u6b65\u4e4b\u6240\u5728\u3002\n\n\u53e4\u4eca\u7684\u201c\u5b66\u4e60\u89c2\u201d\u6709\u76f8\u540c\uff08\u901a\uff09\u4e4b\u5904\uff0c\u56e0\u4e3a\u201c\u4eba\u540c\u6b64\u5fc3\uff0c\u5fc3\u540c\u6b64\u7406\u201d\uff0c\u4ea6\u6709\u4e0d\u540c\u4e4b\u5904\uff0c\u56e0\u4e3a\u201c\u52bf\u5f02\u65f6\u79fb\uff0c\u53d8\u6cd5\u5b9c\u77e3\u201d\u3002'}
]},
{year:2021,title:"\u8bba\u751f\u9022\u5176\u65f6",
prompt:"\u6bcf\u4e2a\u4eba\u90fd\u751f\u6d3b\u5728\u7279\u5b9a\u7684\u65f6\u4ee3\uff0c\u6bcf\u4e2a\u4eba\u5728\u7279\u5b9a\u65f6\u4ee3\u4e2d\u7684\u4eba\u751f\u9053\u8def\u5404\u4e0d\u76f8\u540c\u3002\u5728\u540c\u4e00\u4e2a\u65f6\u4ee3\uff0c\u6709\u4eba\u6168\u53f9\u751f\u4e0d\u9022\u65f6\uff0c\u6709\u4eba\u53ea\u613f\u5b89\u5206\u968f\u65f6\uff0c\u6709\u4eba\u6df1\u611f\u751f\u9022\u5176\u65f6\u3001\u65f6\u4e0d\u6211\u5f85\u2026\u2026\n\n\u8bf7\u4ee5"+L+"\u8bba\u751f\u9022\u5176\u65f6"+R+"\u4e3a\u9898\u76ee\uff0c\u5199\u4e00\u7bc7\u8bae\u8bba\u6587\u3002",
samples:[
{thesis:"\u6000\u63e3\u79ef\u6781\u5fc3\u6001\uff0c\u878d\u5165\u65f6\u4ee3\u6d2a\u6d41\uff0c\u4fbf\u80fd\u751f\u9022\u5176\u65f6\u2014\u2014\u751f\u6b63\u9022\u65f6\uff01",
args:["\u519c\u6c11\u80fc\u624b\u80dd\u8db3\u3001\u5feb\u9012\u5c0f\u54e5\u7a7f\u68ad\u57ce\u4e61\u2014\u2014\u666e\u901a\u4eba\u7684\u594b\u6597\u4e4b\u7f8e","\u859b\u5a05\u3001\u5f20\u4e00\u9e23\u2014\u2014\u4e92\u8054\u7f51\u65f6\u4ee3\u7684\u5f04\u6f6e\u513f","\u5f53\u4ee3\u767e\u5e74\u5927\u53d8\u5c40\u2014\u2014\u4e2d\u534e\u6c11\u65cf\u786e\u5b9e\u751f\u9022\u5176\u65f6"],
structure:"\u8d42\u5b9a\u5f53\u4ee3\u662f\u597d\u65f6\u4ee3\u2192\u5217\u4e3e\u666e\u901a\u4eba\u594b\u6597\u8005\u2192\u5217\u4e3e\u65f6\u4ee3\u5f04\u6f6e\u513f\u2192\u5347\u534e\u547c\u5401",
highlight:"\u8d34\u8fd1\u73b0\u5b9e\u751f\u6d3b\uff0c\u4ece\u666e\u901a\u4eba\u5199\u8d77\uff0c\u65f6\u4ee3\u611f\u5f3a\uff0c\u60c5\u611f\u5145\u6c9b",
fullText:'\u5f80\u4e8b\u8d8a\u5343\u5e74\uff0c\u6362\u4e86\u4eba\u95f4\u3002\u6177\u6168\u60b2\u6b4c\u541b\u65e0\u6068\uff0c\u7b97\u800c\u4eca\u91cd\u5230\u987b\u60ca\uff1a\n\n\u4eca\u5929\u7684\u65f6\u4ee3\uff0c\u662f\u4e18\u53e4\u672a\u6709\u7684\u65b0\u65f6\u4ee3\uff1b\u6bcf\u4e00\u4f4d\u56fd\u6c11\uff0c\u90fd\u4f1a\u6df1\u611f\u751f\u9022\u5176\u65f6\u3001\u65f6\u4e0d\u6211\u5f85\u2026\u2026\n\n\u8fd9\u662f\u4e00\u4e2a\u201c\u8001\u8005\u5b89\u4e4b\uff0c\u5c11\u8005\u6000\u4e4b\u201d\u7684\u5e78\u798f\u56fd\u5ea6\uff0c\u4e5f\u662f14\u4ebf\u4e2d\u56fd\u4eba\u201c\u8131\u8d2b\u81f4\u5bcc\uff0c\u5171\u4eab\u5c0f\u5eb7\u201d\u7684\u5bcc\u8db3\u65f6\u4ee3\uff0c\u662f\u4e00\u7247\u516c\u5e73\u4e0e\u6b63\u4e49\u9633\u5149\u666e\u7167\u7684\u6717\u6717\u4e7e\u5764\uff0c\u4e5f\u662f\u4e00\u4e2a\u51dd\u805a\u4e86\u6c11\u4f17\u6700\u5927\u516c\u7ea6\u6570\u7684\u201c\u5171\u60c5\u201d\u65f6\u4ee3\u3002\n\n\u5927\u9e4f\u4e00\u65e5\u56e0\u98ce\u8d77\uff0c\u6276\u6447\u76f4\u4e0a\u4e5d\u4e07\u91cc\uff0c\u8c6a\u60c5\u5982\u9e4f\u4e3e\uff0c\u58ee\u5fc3\u4f3c\u9e70\u626c\uff0c\u8eac\u9022\u76db\u4e16\u7684\u6211\u4eec\uff0c\u7aef\u5c45\u6709\u8015\u5723\u660e\uff0c\u6b63\u5f53\u594b\u53d1\u6709\u4e3a\uff01\n\n\u8fd9\u662f\u4e00\u4e2a\u4ee5\u594b\u6597\u4e3a\u8363\u7684\u65f6\u4ee3\u3002\u6bcf\u4e00\u4e2a\u594b\u6bc5\u524d\u884c\u7684\u4eba\uff0c\u90fd\u4f1a\u611f\u5230\u751f\u9022\u5176\u65f6\u3002\n\n\u4f60\u770b\u519c\u6c11\uff0c\u80fc\u624b\u80dd\u8db3\uff0c\u9ea6\u6d6a\u7ffb\u6eda\uff0c\u64ad\u6d12\u6c57\u6c34\uff0c\u6536\u83b7\u5bcc\u8db3\uff1b\u4f60\u770b\u5feb\u9012\u5c0f\u54e5\uff0c\u7a7f\u884c\u5728\u5927\u8857\u5c0f\u5df7\u7684\u75b2\u60e8\u8f9b\u52b3\uff0c\u5168\u6d88\u89e3\u5728\u4e00\u5bb6\u4eba\u5176\u4e50\u878d\u878d\u7684\u665a\u5bb4\u548c\u70ed\u6c14\u817e\u817e\u7684\u996d\u83dc\u4e2d\uff1b\u65e0\u6570\u6253\u5de5\u4eba\uff0c\u50cf\u5019\u9e1f\u4e00\u6837\u5357\u6765\u5317\u5f80\u5730\u7a7f\u68ad\uff0c\u4f46\u65e0\u65f6\u65e0\u523b\u4e0d\u6000\u63e3\u7740\u7528\u594b\u6597\u8d62\u5f97\u7f8e\u597d\u751f\u6d3b\u7684\u68a6\u60f3\u3002\n\n\u8fd9\u662f\u4e00\u4e2a\u5b55\u80b2\u65e0\u9650\u53ef\u80fd\u7684\u65f6\u4ee3\uff0c\u6bcf\u4e2a\u6e34\u671b\u6210\u529f\u7684\u4eba\uff0c\u90fd\u611f\u5230\u751f\u9022\u5176\u65f6\u3002\n\n\u4e92\u8054\u7f51+\u3001\u4eba\u5de5\u667a\u80fd\u65f6\u4ee3\u5df2\u7136\u6765\u4e34\uff0c\u5b83\u4ef7\u4f3c\u4e00\u6761\u5de8\u5927\u7684\u9f3f\u9c7c\uff0c\u6504\u52a8\u5f97\u65f6\u4ee3\u7684\u5927\u6c5f\u5927\u6cb3\u98df\u7269\u5145\u8db3\u3001\u8840\u517b\u5145\u5206\u3002\u6bcf\u4e00\u4e2a\u6709\u51c6\u5907\u7684\u5934\u8111\uff0c\u5b9a\u4e0d\u4f1a\u8f9c\u8d1f\u65f6\u4ee3\uff0c\u65f6\u4ee3\u7684\u5927\u98ce\uff0c\u4e5f\u4f1a\u9752\u776c\u6bcf\u4e00\u7247\u98de\u7fd4\u7684\u7fbd\u7fc5\u3002\n\n\u5c31\u50cf\u859b\u5a05\uff0c\u5728\u76f4\u64ad\u5e26\u8d27\u7ecf\u6d4e\u7684\u6625\u5929\uff0c\u5728\u52a9\u529b\u8131\u8d2b\u653b\u575a\u4e2d\uff0c\u4e5f\u6536\u83b7\u4e86\u81ea\u5df1\u4eba\u751f\u4e8b\u4e1a\u7684\u6625\u5929\uff1b\u5c31\u50cf\u5f20\u4e00\u9e23\uff0c\u65e0\u7591\u662f\u65f6\u4ee3\u6d6a\u6f6e\u4e2d\u7684\u5f04\u6f6e\u513f\uff0c\u51ed\u501f\u5bf9\u65b0\u98ce\u53e3\u7684\u654f\u9510\u55c5\u89c9\u548c\u524d\u77bb\u5e03\u5c40\u7684\u5b8f\u89c2\u80fd\u529b\uff0c\u5728\u5f53\u4eca\u98ce\u4e91\u53d8\u5e7b\u7684\u4e92\u8054\u7f51\u884c\u4e1a\u5e94\u53d8\u81ea\u5982\uff0c\u6210\u4e3a\u52bf\u4e0d\u53ef\u5f53\u7684\u65b0\u9510\u529b\u91cf\u3002\n\n\u5929\u9ad8\u4efb\u9e1f\u98de\uff0c\u6d77\u9614\u51ed\u9c7c\u8dc3\u3002\u6f6e\u5e73\u4e24\u5cb8\u9614\uff0c\u98ce\u6b63\u4e00\u5e06\u60ac\u3002\u4e0d\u8981\u6168\u53f9\u751f\u4e0d\u9022\u65f6\uff0c\u65f6\u65f6\u6df1\u611f\u751f\u9022\u5176\u65f6\uff0c\u662f\u4e00\u79cd\u5bf9\u81ea\u6211\u3001\u5bf9\u65f6\u4ee3\u7684\u60a6\u7eb3\u3002\n\n\u5956\u52b1\u5427\uff01\u8ba9\u8fd9\u6700\u597d\u7684\u65f6\u4ee3\uff0c\u6210\u5c31\u6211\u4eec\u4e00\u751f\u7684\u6700\u7f8e\u9645\u9047\u5427\uff01\n\n\u751f\u6b63\u9022\u65f6\uff01'},
{thesis:"\u552f\u6709\u79ef\u6781\u8fdb\u53d6\u8005\u624d\u4f1a\u6df1\u611f\u751f\u9022\u5176\u65f6\u2014\u2014\u4e8b\u5728\u4eba\u4e3a\uff0c\u65f6\u4e0d\u6211\u5f85\uff0c\u6000\u63e3\u79ef\u6781\u5fc3\u6001\u4fbf\u80fd\u751f\u9022\u5176\u65f6\u3002",
args:["\u5b54\u5b50\u4e00\u751f\u7a77\u56f0\u5904\u5904\u78b0\u58c1\u5374\u6210\u4e07\u4e16\u5e08\u8868\u2014\u2014\u201c\u751f\u4e0d\u9022\u65f6\u201d\u8005\u4ea6\u53ef\u8d85\u8d8a\u65f6\u4ee3","\u888b\u9686\u5e73\u5b88\u671b\u7a3b\u7530\u3001\u53f6\u5609莹\u60c5\u7cfb\u8bd7\u8bcd\u2014\u2014\u4efb\u4f55\u65f6\u4ee3\u7686\u53ef\u751f\u9022\u5176\u65f6","\u82cf\u8f7c\u201c\u7528\u820d\u7531\u65f6\uff0c\u884c\u85cf\u5728\u6211\u201d\u2014\u2014\u4e3b\u52a8\u4f5c\u4e3a\u662f\u5173\u952e"],
