  return '<div class="sl"><div class="r"><span class="sn">2</span><h2>\u9650\u65f6\u6784\u601d</h2></div><p class="sb">\u5728\u5012\u8ba1\u65f6\u5185\u5b8c\u6210\u5ba1\u9898\u3001\u7acb\u8bba\u3001\u9009\u636e</p></div><div class="tm" id="tw"><span class="tv" id="td">08:00</span><span style="font-size:12px;color:var(--mt)">\u5269\u4f59\u65f6\u95f4</span></div><div class="c" style="margin-bottom:18px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="font-size:11px;font-family:var(--fm);color:var(--ac);font-weight:700">'+esc(String(t.year))+'\u5e74</span><span style="font-size:17px;font-weight:700">'+esc(t.title)+'</span></div><p style="font-size:14px;line-height:1.8;white-space:pre-line">'+esc(t.prompt)+'</p></div><div class="f"><label>\u270d\ufe0f \u4e2d\u5fc3\u8bba\u70b9 <span>(\u4e00\u53e5\u8bdd\u6982\u62ec)</span></label><textarea id="th" rows="2" oninput="S.ui.thesis=this.value">'+esc(S.ui.thesis)+'</textarea></div><div class="f"><label>\ud83d\udccc \u8bba\u636e1</label><input type="text" id="a0" oninput="S.ui.args[0]=this.value" value="'+esc(S.ui.args[0])+'"></div><div class="f"><label>\ud83d\udccc \u8bba\u636e2</label><input type="text" id="a1" oninput="S.ui.args[1]=this.value" value="'+esc(S.ui.args[1])+'"></div><div class="f"><label>\ud83d\udccc \u8bba\u636e3</label><input type="text" id="a2" oninput="S.ui.args[2]=this.value" value="'+esc(S.ui.args[2])+'"></div><div class="f"><label>\ud83c\udfd7\ufe0f \u8bba\u8bc1\u7ed3\u6784 <span>(\u53ef\u591a\u9009)</span></label><div class="tg">'+tags+'</div></div><button class="bt" onclick="go2()" style="margin-top:16px">\u63d0\u4ea4\u6784\u601d \u2192</button>';
}
function togS(s){var i=S.ui.structs.indexOf(s);if(i>=0)S.ui.structs.splice(i,1);else S.ui.structs.push(s);var ts=document.querySelectorAll('.t');for(var j=0;j<ts.length;j++){ts[j].className=S.ui.structs.indexOf(ts[j].textContent)>=0?'t s':'t';}}
function go2(){var th=document.getElementById('th');if(th)S.ui.thesis=th.value;for(var i=0;i<3;i++){var e=document.getElementById('a'+i);if(e)S.ui.args[i]=e.value;}if(!S.ui.thesis.trim()){alert('\u8bf7\u586b\u5199\u4e2d\u5fc3\u8bba\u70b9');return;}tstop();S.step=2;render();}

function rld(){return '<div class="sl"><div class="r"><span class="sn">3</span><h2>AI \u8bca\u65ad & \u5927\u7eb2</h2></div></div><div class="ld"><div class="li">\ud83d\udd0d</div><p style="color:var(--mt)">\u6b63\u5728\u5206\u6790\u4f60\u7684\u6784\u601d\u2026</p></div>';}
function dodiag(){
  var t=S.topic,u=S.ui,sr='';if(t.samples&&t.samples.length){sr='\n\n\u3010\u53c2\u8003\u8303\u6587\u3011\n';for(var i=0;i<t.samples.length;i++){var s=t.samples[i];sr+='\u8303\u6587'+(i+1)+'\u8bba\u70b9\uff1a'+s.thesis+'\n\u8bba\u636e\uff1a'+s.args.join('\uff1b')+'\n\u7ed3\u6784\uff1a'+s.structure+'\n\n';}}
  ai('\u4f5c\u6587\u9898\u76ee\uff1a'+t.title+'\n\u9898\u76ee\u8981\u6c42\uff1a'+t.prompt+'\n\n\u5b66\u751f\u6784\u601d\uff1a\n\u8bba\u70b9\uff1a'+u.thesis+'\n\u8bba\u636e1\uff1a'+u.args[0]+'\n\u8bba\u636e2\uff1a'+u.args[1]+'\n\u8bba\u636e3\uff1a'+u.args[2]+'\n\u7ed3\u6784\uff1a'+u.structs.join('\u3001')+sr+'\n\n\u8fd4\u56deJSON\uff08\u4e0d\u8981\u4ee3\u7801\u5757\uff09\uff1a{"score":1\u523010,"thesisReview":"\u8bba\u70b9\u8bc4\u4ef750\u5b57","argsReview":"\u8bba\u636e\u8bc4\u4ef7","structureReview":"\u7ed3\u6784\u8bc4\u4ef7","suggestions":["\u5efa\u8bae1","\u5efa\u8bae2","\u5efa\u8bae3"],"recommendedArgs":["\u8865\u5145\u8bba\u636e1","\u8865\u5145\u8bba\u636e2"],"outline":{"opening":"\u5f00\u5934\u6838\u5fc3\u53e5","body":["\u4e3b\u4f531","\u4e3b\u4f532","\u4e3b\u4f533"],"closing":"\u7ed3\u5c3e\u6838\u5fc3\u53e5"},"sampleOpening":"\u5f00\u5934\u793a\u8303150\u5b57","sampleClosing":"\u7ed3\u5c3e\u793a\u8303150\u5b57"}\u4ec5\u8fd4\u56deJSON\u3002').then(function(raw){
    var p=pj(raw);if(p){S.diag=p;S.ol=p.outline;}else{S.diag={score:0,thesisReview:'\u8bca\u65ad\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5API Key',argsReview:'',structureReview:'',suggestions:[],recommendedArgs:[],outline:null,sampleOpening:'',sampleClosing:''};}
    document.getElementById('bx').innerHTML=r2();
  });
}
function r2(){
  var d=S.diag,sc=d.score>=7?'sh':d.score>=4?'sm':'slo',st=d.score>=8?'\ud83c\udf89 \u601d\u8def\u51fa\u8272\uff01':d.score>=6?'\ud83d\udc4d \u65b9\u5411\u6b63\u786e':d.score>=4?'\ud83d\udca1 \u9700\u8981\u52a0\u5f3a':'\u26a0\ufe0f \u91cd\u65b0\u5ba1\u9898';
  var h='<div class="sl"><div class="r"><span class="sn">3</span><h2>AI \u8bca\u65ad & \u5927\u7eb2</h2></div></div>';
  h+='<div class="c" style="display:flex;align-items:center;gap:16px"><div class="sc '+sc+'">'+d.score+'</div><div><div style="font-size:15px;font-weight:700">'+st+'</div><div style="font-size:12px;color:var(--mt)">\u7efc\u5408\u8bc4\u5206\uff08\u6ee110\uff09</div></div></div>';
  [{i:'\ud83c\udfaf',l:'\u8bba\u70b9',t:d.thesisReview},{i:'\ud83d\udcda',l:'\u8bba\u636e',t:d.argsReview},{i:'\ud83c\udfd7\ufe0f',l:'\u7ed3\u6784',t:d.structureReview}].forEach(function(x){h+='<div class="c"><div style="font-size:13px;font-weight:700;margin-bottom:4px">'+x.i+' '+x.l+'</div><p style="font-size:14px;line-height:1.7">'+esc(x.t)+'</p></div>';});
  if(d.suggestions&&d.suggestions.length){h+='<div class="c cd"><div style="font-size:13px;font-weight:700;color:var(--ac);margin-bottom:8px">\ud83d\udca1 \u6539\u8fdb\u5efa\u8bae</div>';d.suggestions.forEach(function(s,i){h+='<p style="margin:4px 0;font-size:13px">'+(i+1)+'. '+esc(s)+'</p>';});h+='</div>';}
  if(d.recommendedArgs&&d.recommendedArgs.length){h+='<div class="c"><div style="font-size:13px;font-weight:700;margin-bottom:8px">\ud83d\udcce \u63a8\u8350\u8865\u5145\u8bba\u636e</div>';d.recommendedArgs.forEach(function(a){h+='<p style="margin:4px 0;font-size:13px;color:var(--ok)">+ '+esc(a)+'</p>';});h+='</div>';}
  if(S.ol){var o=S.ol;h+='<div class="c ca"><div style="font-size:14px;font-weight:700;color:var(--ac);margin-bottom:12px">\ud83d\udccb \u5927\u7eb2</div><div style="font-size:13px;line-height:2"><p><strong>\u3010\u5f00\u5934\u3011</strong>'+esc(o.opening)+'</p>';if(o.body)o.body.forEach(function(b,i){h+='<p><strong>\u3010\u4e3b\u4f53'+(i+1)+'\u3011</strong>'+esc(b)+'</p>';});h+='<p><strong>\u3010\u7ed3\u5c3e\u3011</strong>'+esc(o.closing)+'</p></div></div>';}
  if(S.topic.samples&&S.topic.samples.length){h+='<div class="c"><div style="font-size:14px;font-weight:700;margin-bottom:12px">\ud83d\udcd6 \u8303\u6587\u53c2\u8003</div>';S.topic.samples.forEach(function(s,i){h+='<div class="sc2"><div style="font-weight:700;color:var(--ac);margin-bottom:4px">\u8303\u6587'+(i+1)+'</div><p><strong>\u8bba\u70b9\uff1a</strong>'+esc(s.thesis)+'</p><p><strong>\u7ed3\u6784\uff1a</strong>'+esc(s.structure)+'</p><p style="color:var(--ok)"><strong>\u4eae\u70b9\uff1a</strong>'+esc(s.highlight)+'</p></div>';});h+='</div>';}
  h+='<div class="fr"><button class="bt" onclick="go3()">\u7ee7\u7eed\uff1a\u5f00\u5934\u7ed3\u5c3e\u7ec3\u7b14 \u2192</button><button class="bg" onclick="go4()">\u8df3\u8fc7</button></div>';
  return h;
}
function go3(){S.step=3;document.getElementById('bx').innerHTML=r3();rprog();}
function go4(){S.step=4;document.getElementById('bx').innerHTML=r4();rprog();}

function r3(){
  var hint=S.ol?'<div class="c cd" style="font-size:13px;line-height:1.8;margin-bottom:18px"><strong>\u5927\u7eb2\u63d0\u793a\uff1a</strong>\u5f00\u5934\u2014\u2014'+esc(S.ol.opening)+' | \u7ed3\u5c3e\u2014\u2014'+esc(S.ol.closing)+'</div>':'';
  return '<div class="sl"><div class="r"><span class="sn">4</span><h2>\u5f00\u5934 & \u7ed3\u5c3e\u7ec3\u7b14</h2></div><p class="sb">\u53ef\u8df3\u8fc7</p></div>'+hint+'<div class="f"><label>\ud83d\udcdd \u5f00\u5934\u6bb5</label><textarea id="oi" rows="5" oninput="S.uo=this.value">'+esc(S.uo)+'</textarea><div class="cc">'+S.uo.length+' \u5b57</div></div><div class="f"><label>\ud83d\udcdd \u7ed3\u5c3e\u6bb5</label><textarea id="ci" rows="5" oninput="S.uc=this.value">'+esc(S.uc)+'</textarea><div class="cc">'+S.uc.length+' \u5b57</div></div><div class="fr"><button class="bt" id="swb" onclick="subw()">\u63d0\u4ea4\u70b9\u8bc4 \u2192</button><button class="bg" onclick="go4()">\u8df3\u8fc7</button></div>';
}
function subw(){
  S.uo=document.getElementById('oi')?document.getElementById('oi').value:'';S.uc=document.getElementById('ci')?document.getElementById('ci').value:'';
  var b=document.getElementById('swb');if(b){b.disabled=true;b.textContent='\u70b9\u8bc4\u4e2d\u2026';}
  ai('\u4f5c\u6587\u9898\u76ee\uff1a'+S.topic.title+'\n\u5f00\u5934\u6bb5\uff1a'+(S.uo||'\u672a\u586b')+'\n\u7ed3\u5c3e\u6bb5\uff1a'+(S.uc||'\u672a\u586b')+'\n\n\u70b9\u8bc4\u540c50\u5b57\u5185\uff0c\u8fd4\u56deJSON\uff1a{"openingFeedback":"","closingFeedback":"","openingScore":1\u523010,"closingScore":1\u523010}\u4ec5\u8fd4\u56deJSON\u4e0d\u8981\u4ee3\u7801\u5757\u3002').then(function(raw){
    S.fb=pj(raw)||{openingFeedback:'\u5931\u8d25',closingFeedback:'\u5931\u8d25',openingScore:0,closingScore:0};S.step=4;document.getElementById('bx').innerHTML=r4();rprog();
  });
}

function r4(){
  var h='<div class="sl"><div class="r"><span class="sn">5</span><h2>\u603b\u7ed3 & \u5bf9\u6bd4</h2></div></div>';
  if(S.fb){[{l:'\u5f00\u5934\u6bb5',sc:S.fb.openingScore,t:S.fb.openingFeedback,u:S.uo,sm:S.diag?S.diag.sampleOpening:''},{l:'\u7ed3\u5c3e\u6bb5',sc:S.fb.closingScore,t:S.fb.closingFeedback,u:S.uc,sm:S.diag?S.diag.sampleClosing:''}].filter(function(x){return x.u;}).forEach(function(x){
    h+='<div class="c"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:14px;font-weight:700">'+x.l+'</span><span style="font-size:12px;font-family:var(--fm);font-weight:700;padding:2px 8px;border-radius:10px;background:'+(x.sc>=7?'#e8f5e9':'#fff8e1')+';color:'+(x.sc>=7?'var(--ok)':'var(--wn)')+'">'+x.sc+'/10</span></div><p style="font-size:13px;color:var(--ac);margin-bottom:10px">'+esc(x.t)+'</p><div class="cp cu"><div style="font-size:11px;font-weight:700;color:var(--mt);margin-bottom:4px">\u4f60\u5199\u7684</div>'+esc(x.u)+'</div>'+(x.sm?'<div class="cp cs"><div style="font-size:11px;font-weight:700;color:var(--ok);margin-bottom:4px">\u9ad8\u5206\u793a\u8303</div>'+esc(x.sm)+'</div>':'')+'</div>';
  });}
  h+='<div class="c"><div style="font-size:14px;font-weight:700;margin-bottom:12px">\ud83d\udcda \u7d20\u6750\u5e93\u901f\u67e5</div>';
  for(var cat in MBANK){h+='<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:700;color:var(--ac);margin-bottom:4px">'+cat+'</div>';MBANK[cat].forEach(function(x){h+='<p style="margin:2px 0;font-size:12px;color:var(--mt)">\u2022 '+esc(x)+'</p>';});h+='</div>';}
  h+='</div><button class="bt" onclick="reset()" style="margin-top:16px">\ud83d\udd04 \u518d\u7ec3\u4e00\u9898</button>';return h;
}
function reset(){tstop();S={step:0,topic:null,ui:{thesis:'',args:['','',''],structs:[]},tl:480,tr:false,tid:null,diag:null,ol:null,uo:'',uc:'',fb:null};render();}
render();
</script>
